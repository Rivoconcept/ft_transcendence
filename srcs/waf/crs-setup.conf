# ---- PARANOIA ----
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.blocking_paranoia_level=1"

SecAction \
    "id:900001,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.detection_paranoia_level=2"

# ---- ANOMALY SCORING ----
SecAction \
    "id:900110,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.inbound_anomaly_score_threshold=15,\
    setvar:tx.outbound_anomaly_score_threshold=10"

# ---- METHODES HTTP AUTORISEES ----
SecAction \
    "id:900200,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE PATCH'"

# ---- CONTENT TYPES AUTORISES ----
SecAction \
    "id:900220,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:'tx.allowed_request_content_type=application/json|multipart/form-data|application/x-www-form-urlencoded'"

# ---- TAILLE MAX ----
SecAction \
    "id:900300,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.max_num_args=255,\
    setvar:tx.arg_name_length=100,\
    setvar:tx.arg_length=400,\
    setvar:tx.total_arg_length=64000,\
    setvar:tx.max_file_size=10485760,\
    setvar:tx.combined_file_sizes=10485760"

# ---- CRS VERSION MARKER (required for CRS v4) ----
SecAction \
    "id:900990,\
    phase:1,\
    nolog,\
    pass,\
    t:none,\
    setvar:tx.crs_setup_version=470"