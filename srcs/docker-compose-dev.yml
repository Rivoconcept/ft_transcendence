services:
  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
    volumes:
      - vault-secrets:/run/secrets
      - ./.env.vault:/vault/vault-init:ro
      - ./vault/init.sh:/vault/init.sh:ro
    command: sh /vault/init.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - transcendence-network

  vault:
    image: hashicorp/vault:1.15
    container_name: vault-dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID}
      VAULT_DEV_LISTEN_ADDRESS: ${VAULT_DEV_LISTEN_ADDRESS}
    volumes:
      - ./.env.vault:/vault/vault-init:ro
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - transcendence-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_URL: http://${DOMAIN_NAME}:${BACKEND_PORT}/api
      VITE_SOCKET_URL: ws://${DOMAIN_NAME}:${BACKEND_PORT}
    networks:
      - transcendence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    volumes:
      - ./backend:/app
      - vault-secrets:/run/secrets:ro
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      VAULT_ADDR: http://vault:8200
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcendence-network

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
    volumes:
      - vault-secrets:/run/secrets:ro
      - ${DATA_PATH}/db_data:/var/lib/postgresql/data
    depends_on:
      vault-init:
        condition: service_completed_successfully
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    entrypoint: /custom-entrypoint.sh
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: /run/secrets/PGADMIN_DEFAULT_PASSWORD
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_SERVER_NAME: ${PGADMIN_SERVER_NAME}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ./pgadmin/custom-entrypoint.sh:/custom-entrypoint.sh:ro
      - vault-secrets:/run/secrets:ro
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    networks:
      - transcendence-network

volumes:
  vault-secrets:

networks:
  transcendence-network:
    driver: bridge
