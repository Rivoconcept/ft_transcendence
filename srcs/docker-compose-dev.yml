  #     - MODSEC_REQ_BODY_ACCESS=On

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    volumes:
      - vault-secrets:/run/secrets/GameHub:ro
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://${DOMAIN_NAME}:${BACKEND_PORT}/api
      VITE_SOCKET_URL: ws://${DOMAIN_NAME}:${BACKEND_PORT}
    networks:
      - transcendence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    volumes:
      - ./backend:/app
      - vault-secrets:/run/secrets/GameHub:ro
    ports:
      - "3000:3000"
    environment:
      VAULT_ADDR: ${VAULT_ADDR}
    depends_on:
      postgres:
        condition: service_healthy
      vault-agent:
        condition: service_healthy      
    networks:
      - transcendence-network

  postgres:
    image: postgres:16
    container_name: postgres
    volumes:
      - vault-secrets:/run/secrets/GameHub:ro
      - ${DATA_PATH}/db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER_FILE: /run/secrets/GameHub/postgres/POSTGRES_USER
      POSTGRES_PASSWORD_FILE: /run/secrets/GameHub/postgres/POSTGRES_PASSWORD
      POSTGRES_DB_FILE: /run/secrets/GameHub/postgres/POSTGRES_DB
    depends_on:
      vault-agent:
        condition: service_healthy
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$(cat /run/secrets/GameHub/postgres/POSTGRES_USER)"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    entrypoint: /custom-entrypoint.sh
    environment:
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
    volumes:
      - ./pgadmin/custom-entrypoint.sh:/custom-entrypoint.sh:ro
      - vault-secrets:/run/secrets/GameHub:ro
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcendence-network

volumes:
  vault-secrets:
  vault-approle:
  vault-data:

networks:
  transcendence-network:
    driver: bridge

secrets:
  vault_crt:
    file: ../secrets/certs/vault.crt
  vault_key:
    file: ../secrets/certs/vault.key

