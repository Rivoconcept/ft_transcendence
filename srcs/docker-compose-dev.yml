services:
  vault:
    build:
      context: ./vault/server
      dockerfile: Dockerfile
    container_name: vault-dev
    hostname: vault
    cap_add:
      - IPC_LOCK
    entrypoint: ["vault", "server", "-config=/vault/config/vault.hcl"]
    volumes:
      - ./vault/server/vault.hcl:/vault/config/vault.hcl:ro
      - vault-data:/vault/data 
    ports:
      - 8200:8200
    networks:
      - transcendence-network
    secrets:
      - source: vault_crt
        target: vault.crt
      - source: vault_key
        target: vault.key
    healthcheck:
      test: ["CMD", "sh", "-c", "vault status -address=https://vault:8200 -tls-skip-verify; [ $? -ne 1 ]"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  vault-init:
    build:
      context: ./vault/init
      dockerfile: Dockerfile
    container_name: vault-init
    user: "0:1000"
    environment:
      VAULT_ADDR: https://vault:8200
      VAULT_CACERT: /run/secrets/vault.crt
    volumes:
      - ./vault/init/init.sh:/vault/init.sh:ro
      - ./vault/init/init.json:/vault/vault-init.json:ro
      - vault-approle:/run/secrets/vault
      - vault-secrets:/run/secrets/GameHub
    command: ["sh", "/vault/init.sh"]
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - transcendence-network
    secrets:
      - source: vault_crt
        target: vault.crt
      - source: vault_key
        target: vault.key

  vault-agent:
    build:
      context: ./vault/agent
      dockerfile: Dockerfile
    container_name: vault-agent
    user: "1000:1000"
    environment:
      VAULT_ADDR: https://vault:8200
      VAULT_CACERT: /run/secrets/vault.crt
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/agent/config.hcl:/vault/config/agent.hcl:ro
      - ./vault/agent/templates:/vault/templates:ro
      - vault-approle:/run/secrets/vault
      - vault-secrets:/run/secrets/GameHub
    depends_on:
      vault-init:
        condition: service_completed_successfully
    secrets:
      - source: vault_crt
        target: vault.crt
      - source: vault_key
        target: vault.key
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "test -s /run/secrets/GameHub/certs/backend/backend.key && (echo 'OK' || exit 1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

