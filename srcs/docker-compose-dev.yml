services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT}:5173"
    environment:
      VITE_API_URL: http://${DOMAIN_NAME}:${BACKEND_PORT}/api
      VITE_SOCKET_URL: ws://${DOMAIN_NAME}:${BACKEND_PORT}
    networks:
      - transcendence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT}:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      - postgres
    networks:
      - transcendence-network

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DATA_PATH}/db_data:/var/lib/postgresql/data
    # secrets:
    #   - POSTGRES_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transcendence-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    entrypoint: /custom-entrypoint.sh
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /tmp/servers.json
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_SERVER_NAME: ${PGADMIN_SERVER_NAME}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - ./pgadmin/custom-entrypoint.sh:/custom-entrypoint.sh:ro
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    networks:
      - transcendence-network


# secrets:
#   POSTGRES_PASSWORD:
#     file: ../secrets/POSTGRES_PASSWORD.txt

networks:
  transcendence-network:
    driver: bridge
