services:
  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - vault-secrets:/run/secrets
      - ./.env.vault:/vault/vault-init:ro
      - ./vault/init.sh:/vault/init.sh:ro
    command: sh /vault/init.sh
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - transcendence-network

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
    volumes:
      - ${DATA_PATH}/db_data:/var/lib/postgresql/data
      - vault-secrets:/run/secrets:ro
    depends_on:
      vault-init:
        condition: service_completed_successfully
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: node-backend
    environment:
      NODE_ENV: production
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transcendence-network
    ports:
      - "3000:3000"

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.prod
  #   container_name: frontend
  #   environment:
  #     DOMAIN_NAME: ${DOMAIN}
  #   depends_on:
  #     - backend
  #   networks:
  #     - transcendence-network
  #   volumes:
  #     - ../secrets/certs:/etc/ssl/private/
      

volumes:
  db_data:
    external: true
  site_data:
    external: true
  vault-secrets:

networks:
  transcendence-network:
    driver: bridge
